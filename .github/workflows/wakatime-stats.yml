name: Generate WakaTime Stats

on:
  schedule:
    - cron: "30 2 * * *" # Runs daily at 02:30 UTC
  workflow_dispatch:

concurrency:
  group: wakatime-stats
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate WakaTime card
        run: python scripts/generate_wakatime_stats.py --username cappy --output assets/wakatime-stats.svg

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/wakatime-stats.svg
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update WakaTime stats"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
          echo "Push failed after 3 attempts"
          exit 1
