<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
    <style>
        .flower1 {
            animation: sway 3s ease-in-out infinite alternate;
            transform-origin: bottom center;
            transform-box: fill-box;
        }

        .flower2 {
            animation: sway 3.5s ease-in-out infinite alternate-reverse;
            transform-origin: bottom center;
            transform-box: fill-box;
        }

        @keyframes sway {
            0% {
                transform: rotate(-3deg);
            }

            100% {
                transform: rotate(3deg);
            }
        }
    </style>

    <!-- flower 1 -->
    <g class="flower1">
        <!-- stem -->
        <path d="M 20 40 Q 30 60 30 90" fill="none" stroke="#2ea043" stroke-width="4" stroke-linecap="round" />
        <!-- petals -->
        <circle cx="20" cy="30" r="8" fill="#bb86fc" />
        <circle cx="10" cy="40" r="8" fill="#bb86fc" />
        <circle cx="30" cy="40" r="8" fill="#bb86fc" />
        <circle cx="15" cy="50" r="8" fill="#bb86fc" />
        <circle cx="25" cy="50" r="8" fill="#bb86fc" />
        <circle cx="20" cy="40" r="6" fill="#f1e05a" />
        <!-- leaf -->
        <path d="M 28 65 Q 40 60 45 75 Z" fill="#3fb950" />
    </g>

    <!-- flower 2 -->
    <g class="flower2">
        <!-- stem -->
        <path d="M 80 35 Q 70 50 70 90" fill="none" stroke="#2ea043" stroke-width="4" stroke-linecap="round" />
        <circle cx="80" cy="25" r="6" fill="#00d4ff" />
        <circle cx="72" cy="32" r="6" fill="#00d4ff" />
        <circle cx="88" cy="32" r="6" fill="#00d4ff" />
        <circle cx="75" cy="40" r="6" fill="#00d4ff" />
        <circle cx="85" cy="40" r="6" fill="#00d4ff" />
        <circle cx="80" cy="33" r="5" fill="#f1e05a" />
        <!-- leaf -->
        <path d="M 72 70 Q 60 65 55 80 Z" fill="#3fb950" />
    </g>
    <!-- grass base -->
    <path d="M 10 90 Q 50 85 90 90" fill="none" stroke="#3fb950" stroke-width="6" stroke-linecap="round" />
    <path d="M 20 90 L 15 75" fill="none" stroke="#3fb950" stroke-width="3" stroke-linecap="round" />
    <path d="M 50 90 L 48 70" fill="none" stroke="#3fb950" stroke-width="4" stroke-linecap="round" />
    <path d="M 80 90 L 85 75" fill="none" stroke="#3fb950" stroke-width="3" stroke-linecap="round" />
</svg>