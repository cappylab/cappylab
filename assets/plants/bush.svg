<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
    <style>
        .bush {
            animation: sway 4s ease-in-out infinite alternate;
            transform-origin: bottom center;
            transform-box: fill-box;
        }

        @keyframes sway {
            0% {
                transform: rotate(-2deg);
            }

            100% {
                transform: rotate(2deg);
            }
        }
    </style>
    <g class="bush">
        <!-- Bush body -->
        <path d="M 20 80 Q 10 50 30 40 Q 40 10 60 20 Q 80 10 90 40 Q 110 60 80 80 Z" fill="#2ea043" />
        <path d="M 30 75 Q 25 55 40 45 Q 50 25 65 30 Q 75 25 80 45 Q 95 60 70 75 Z" fill="#3fb950" />

        <!-- Berries -->
        <circle cx="40" cy="50" r="4" fill="#ff6b6b" />
        <circle cx="65" cy="40" r="5" fill="#ff6b6b" />
        <circle cx="75" cy="60" r="4" fill="#ff6b6b" />
        <circle cx="30" cy="65" r="3" fill="#ff6b6b" />
        <circle cx="55" cy="65" r="4" fill="#ff6b6b" />
    </g>
    <!-- Base -->
    <path d="M 10 80 L 90 80" stroke="#3fb950" stroke-width="3" stroke-linecap="round" />
</svg>