<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -10 700 95" width="700" height="95">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#00d4ff" />
            <stop offset="100%" style="stop-color:#bb86fc" />
        </linearGradient>
    </defs>
    <style>
        @keyframes stretch {

            0%,
            100% {
                transform: scaleX(1) translateX(0)
            }

            50% {
                transform: scaleX(1.05) translateX(-2px)
            }
        }

        @keyframes tail-lazy {

            0%,
            100% {
                transform: rotate(-5deg)
            }

            50% {
                transform: rotate(8deg)
            }
        }

        .cat-lazy {
            animation: stretch 4s ease-in-out infinite;
            transform-origin: center;
            transform-box: fill-box;
        }



        .flower-sway {
            animation: sway 3s ease-in-out infinite alternate;
            transform-origin: bottom center;
            transform-box: fill-box;
        }

        @keyframes sway {
            0% {
                transform: rotate(-3deg);
            }

            100% {
                transform: rotate(3deg);
            }
        }
    </style>
    <rect x="30" y="20" width="640" height="40" rx="20" fill="url(#bg)" />
    <text x="350" y="46" font-family="Segoe UI,sans-serif" font-size="16" font-weight="bold" fill="white"
        text-anchor="middle" letter-spacing="2">CONTRIBUTION ACTIVITY</text>
    <!-- Cat lying lazily ON TOP of bar, far right side -->
    <g transform="translate(640, -2)">
        <!-- Tail — static, curving to the right -->
        <path d="M 20 12 Q 28 4, 32 8 Q 34 12, 30 10" fill="none" stroke="#f5deb3" stroke-width="4"
            stroke-linecap="round" />
        <!-- Body -->
        <ellipse cx="5" cy="14" rx="18" ry="8" fill="#f5deb3" />
        <ellipse cx="5" cy="15" rx="12" ry="5" fill="#ffefd5" />
        <!-- Head resting — facing left -->
        <circle cx="-12" cy="13" r="9" fill="#f5deb3" />
        <!-- Ears -->
        <polygon points="-19,7 -17,0 -14,7" fill="#f5deb3" />
        <polygon points="-10,7 -7,0 -5,7" fill="#f5deb3" />
        <polygon points="-18,6 -17,2 -15,6" fill="#ff69b4" opacity="0.35" />
        <polygon points="-9,6 -7,2 -6,6" fill="#ff69b4" opacity="0.35" />
        <!-- Sleepy eyes -->
        <path d="M -16 12 Q -14 10.5, -12 12" fill="none" stroke="#333" stroke-width="1.2" stroke-linecap="round" />
        <path d="M -10 11.5 Q -8 10, -6 11.5" fill="none" stroke="#333" stroke-width="1.2" stroke-linecap="round" />
        <!-- Nose -->
        <ellipse cx="-11" cy="15" rx="1.2" ry="0.8" fill="#ff69b4" />
        <!-- Paw -->
        <ellipse cx="-18" cy="21" rx="4" ry="2.5" fill="#f5deb3" />
    </g>

</svg>