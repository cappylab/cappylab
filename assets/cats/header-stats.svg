<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -15 700 105" width="700" height="105">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#00d4ff" />
            <stop offset="100%" style="stop-color:#bb86fc" />
        </linearGradient>
    </defs>
    <style>
        @keyframes leaf-sway {
            0% {
                transform: rotate(-5deg)
            }

            100% {
                transform: rotate(5deg)
            }
        }

        .vine-leaf {
            animation: leaf-sway 3s ease-in-out infinite alternate;
            transform-box: fill-box;
            transform-origin: left center;
        }
    </style>

    <!-- Header bar -->
    <rect x="30" y="20" width="640" height="40" rx="20" fill="url(#bg)" />
    <text x="350" y="46" font-family="Segoe UI,sans-serif" font-size="16" font-weight="bold" fill="white"
        text-anchor="middle" letter-spacing="2">GITHUB ANALYTICS</text>

    <!-- Vine wrapping around header bar — entering from RIGHT side -->
    <g>
        <!--
            Bar is at y=20..60. Vine weaves from right to left:
            Start right (x=700) → above bar (y=15) → cross down → below bar (y=65) → back up → above → exit left
        -->
        <!-- Vine path -->
        <path d="M 700 15
            C 675 15, 655 15, 640 30
            C 625 50, 615 65, 600 65
            C 585 65, 575 65, 560 50
            C 550 35, 545 15, 525 15
            C 510 15, 505 15, 490 30
            C 480 45, 475 65, 460 65" fill="none" stroke="#2ea043" stroke-width="3.5" stroke-linecap="round" />

        <!-- Small tendrils at entry/exit -->
        <path d="M 697 15 Q 700 22 695 28" fill="none" stroke="#2ea043" stroke-width="2" stroke-linecap="round" />
        <path d="M 460 65 Q 452 68 455 75" fill="none" stroke="#2ea043" stroke-width="2" stroke-linecap="round" />

        <!-- Leaves at vine peaks/valleys, attached with stems -->

        <!-- Leaf 1: first peak right side (x≈670, y≈15) — above bar -->
        <g class="vine-leaf">
            <line x1="670" y1="15" x2="672" y2="7" stroke="#2ea043" stroke-width="2" />
            <path d="M 672 7 Q 682 0 674 -4 Q 664 1 672 7 Z" fill="#3fb950" />
        </g>

        <!-- Leaf 2: first peak (x≈650, y≈17) — above bar -->
        <g class="vine-leaf">
            <line x1="650" y1="18" x2="648" y2="9" stroke="#2ea043" stroke-width="2" />
            <path d="M 648 9 Q 638 2 646 -2 Q 656 3 648 9 Z" fill="#7ee787" />
        </g>

        <!-- Leaf 3: first valley (x≈600, y≈65) — below bar -->
        <g class="vine-leaf">
            <line x1="600" y1="65" x2="602" y2="72" stroke="#2ea043" stroke-width="2" />
            <path d="M 602 72 Q 612 78 604 82 Q 594 77 602 72 Z" fill="#3fb950" />
        </g>

        <!-- Leaf 4: second peak (x≈525, y≈15) — above bar -->
        <g class="vine-leaf">
            <line x1="525" y1="15" x2="527" y2="7" stroke="#2ea043" stroke-width="2" />
            <path d="M 527 7 Q 537 0 529 -4 Q 519 1 527 7 Z" fill="#7ee787" />
        </g>

        <!-- Leaf 5: second peak (x≈510, y≈15) — above bar -->
        <g class="vine-leaf">
            <line x1="510" y1="15" x2="507" y2="8" stroke="#2ea043" stroke-width="2" />
            <path d="M 507 8 Q 497 1 505 -2 Q 515 3 507 8 Z" fill="#3fb950" />
        </g>

        <!-- Leaf 6: second valley (x≈465, y≈65) — below bar -->
        <g class="vine-leaf">
            <line x1="465" y1="65" x2="463" y2="72" stroke="#2ea043" stroke-width="2" />
            <path d="M 463 72 Q 453 78 461 82 Q 471 77 463 72 Z" fill="#7ee787" />
        </g>
    </g>
</svg>